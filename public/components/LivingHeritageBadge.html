<!-- public/components/LivingHeritageBadge.html -->
<div class="living-heritage-badge" tabindex="0" role="img" aria-label="Living Heritage Score: {{score}}/{{category}}">
  <span class="badge-icon" data-category="{{category}}"></span>
  <div class="badge-info">
    <span class="badge-score">{{score}}/100</span>
    <span class="badge-category">{{category}}</span>
  </div>
  <div class="badge-tooltip" role="tooltip">
    Based on community participation, documentation, recent updates, and cultural activity.
  </div>
</div>
