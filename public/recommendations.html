<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recommendations - Parampara</title>
    <link rel="stylesheet" href="/styles/main.css">
    <style>
        .recommendations-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .page-header {
            margin-bottom: 30px;
            text-align: center;
        }
        .page-header h1 {
            color: #2E7D32;
            font-size: 2.5em;
            margin: 0;
        }
        .page-header p {
            color: #666;
            font-size: 1.1em;
        }
        .recommendations-section {
            margin-bottom: 40px;
        }
        .section-title {
            font-size: 1.5em;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #4CAF50;
        }
        .recommendations-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .similar-content-section {
            margin-top: 40px;
        }
        .stats-section {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 40px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }
        .stat-card {
            background: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
        }
        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #2E7D32;
        }
        .stat-label {
            color: #666;
            font-size: 0.9em;
        }
        .controls {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        .btn-primary {
            background: #4CAF50;
            color: white;
        }
        .btn-primary:hover {
            background: #388E3C;
        }
        .btn-secondary {
            background: #2196F3;
            color: white;
        }
        .btn-secondary:hover {
            background: #1976D2;
        }
    </style>
</head>
<body>
    <div class="recommendations-page">
        <div class="page-header">
            <h1>📚 Personalized Recommendations</h1>
            <p>Discover cultural content tailored just for you</p>
        </div>

        <div class="controls">
            <button class="btn btn-primary" onclick="window.recommendationUI.refresh()">
                🔄 Refresh Recommendations
            </button>
            <button class="btn btn-secondary" onclick="loadStats()">
                📊 View Statistics
            </button>
        </div>

        <div class="recommendations-section">
            <h2 class="section-title">🌟 Recommended for You</h2>
            <div id="recommendations-container"></div>
        </div>

        <div class="similar-content-section">
            <h2 class="section-title">🔗 Similar Content</h2>
            <div id="similar-content-container">
                <p style="color: #999; text-align: center;">Click on any recommendation to see similar content</p>
            </div>
        </div>

        <div class="stats-section" id="stats-section" style="display: none;">
            <h2 class="section-title">📊 Engagement Statistics</h2>
            <div class="stats-grid" id="stats-grid">
                <!-- Stats will be loaded here -->
            </div>
        </div>
    </div>

    <script src="/scripts/recommendations.js"></script>
    <script>
        async function loadStats() {
            const stats = await window.recommendationUI.getMetrics();
            if (!stats) return;
            
            const section = document.getElementById('stats-section');
            section.style.display = 'block';
            
            const grid = document.getElementById('stats-grid');
            grid.innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.totalInteractions}</div>
                    <div class="stat-label">Total Interactions</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.uniqueUsers}</div>
                    <div class="stat-label">Unique Users</div>
                </div>
                ${Object.entries(stats.interactionsByType || {}).map(([type, count]) => `
                    <div class="stat-card">
                        <div class="stat-value">${count}</div>
                        <div class="stat-label">${type}</div>
                    </div>
                `).join('')}
            `;
        }
    </script>
</body>
</html>
